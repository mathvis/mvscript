name: Haskell CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Haskell
      uses: haskell-actions/setup@v2.7.10
      with:
        enable-stack: true
        stack-version: 'latest'
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Cache Stack
      uses: actions/cache@v3
      with:
        path: |
          ~/.stack
          .stack-work
        key: ${{ runner.os }}-stack-${{ hashFiles('stack.yaml', 'stack.yaml.lock', '**/*.cabal') }}
        restore-keys: |
          ${{ runner.os }}-stack-
    - name: Install dependencies
      run: stack build --only-dependencies
    - name: Build
      run: stack build
    - name: Run tests
      run: python utils/run_tests.py
